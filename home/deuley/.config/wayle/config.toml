[general]
font-sans = "Monoflow"
font-mono = "Monoflow"

[styling]
scale = 1.0
rounding = "md"

[bar]
scale = 1.0
padding = 0.2
padding-ends = 0.2
module-gap = 0.2
location = "bottom"
bg = "bg-base"
button-bg-opacity = 76
button-gap = 0.7
button-group-border-width = 14
button-group-rounding = "md"
button-icon-size = 0.8
button-icon-padding = 1.1
button-label-size = 0.8
button-label-weight = "bold"
button-label-padding = 1.25
button-rounding = "md"
button-variant = "basic"

[[bar.layout]]
monitor = "*"
show = true
left = [
    "dashboard",
    "hyprland-workspaces",
    "window-title",
    "systray",
]
center = [
    "clock",
]
right = [
    "weather",
    "media",
    { name = "group", modules = [
        "volume",
        "bluetooth",
        "network",
        "brightness",
        "battery",
    ] },
    "custom-dictation",
    "custom-keyboard",
    "notifications",
]


# ---- Custom (shell-backed) modules ------------------------------------------

[[modules.custom]]
id = "keyboard"
mode = "poll"
interval-ms = 5000
restart-policy = "never"
restart-interval-ms = 1000
format = "{{ output }}"
tooltip-format = "Toggle on-screen keyboard"
hide-if-empty = false
icon-name = "ld-keyboard-symbolic"
icon-show = true
icon-color = "auto"
icon-bg-color = "blue"
label-show = false
label-color = "auto"
label-max-length = 0
button-bg-color = "bg-surface-elevated"
border-show = false
border-color = "auto"
left-click = "/home/deuley/.config/hypr/scripts/squeek-toggle.sh"
right-click = ""
middle-click = ""
scroll-up = ""
scroll-down = ""

# Local NPU dictation: icon reflects state via dictation-status.sh (down/idle/recording);
# left-click toggles. Styled in styles/index.scss via class-format "dictation-<alt>".
[[modules.custom]]
id = "dictation"
mode = "poll"
interval-ms = 1000
restart-policy = "never"
restart-interval-ms = 1000
command = "/home/deuley/.config/hypr/scripts/dictation-status.sh"
format = "{{ output }}"
tooltip-format = "{{ tooltip }}"
hide-if-empty = false
icon-name = "ld-mic-symbolic"
icon-map = { idle = "ld-mic-symbolic", recording = "ld-audio-lines-symbolic", nomic = "ld-mic-off-symbolic", down = "ld-mic-off-symbolic", default = "ld-mic-off-symbolic" }
class-format = "dictation-{{ alt }}"
icon-show = true
# idle keeps the module's "auto" colour: auto + a blue icon-bg renders the same orange as the
# keyboard module. recording/nomic/down are overridden in styles/index.scss — "auto" lets the
# stylesheet win, whereas an explicit token would override it and the per-state colours wouldn't apply.
icon-color = "auto"
icon-bg-color = "blue"
label-show = false
label-color = "auto"
label-max-length = 0
button-bg-color = "bg-surface-elevated"
border-show = false
border-color = "auto"
left-click = "/run/current-system/sw/bin/dictation-toggle"
on-action = "/home/deuley/.config/hypr/scripts/dictation-status.sh"
right-click = ""
middle-click = ""
scroll-up = ""
scroll-down = ""


# ---- Built-in modules --------------------------------------------------------

[modules.hyprland-workspaces]
min-workspace-count = 6
label-use-name = false
app-icons-show = true
workspace-padding = 0.6
icon-size = 0.5
label-size = 0.6
occupied-color = "fg-muted"
empty-color = "fg-muted"
container-bg-color = "bg-active"
border-show = true

[modules.hyprland-workspaces.workspace-map.-98]
label = "*"
icon-bg-color = "blue"

[modules.dashboard]
border-show = true
border-color = "blue"
icon-color = "blue"
icon-bg-color = "blue"

[modules.clock]
border-color = "status-info"
button-bg-color = "transparent"
format = "%I:%M %p"
icon-show = false
icon-color = "status-info"
icon-bg-color = "transparent"
label-color = "#ffffff"

[modules.weather]
button-bg-color = "transparent"
icon-show = false
location = "78218"
label-color = "fg-muted"
refresh-interval-seconds = 600
units = "imperial"

[modules.window-title]
border-show = true
border-color = "bg-hover"
icon-color = "status-warning"
icon-bg-color = "transparent"
label-color = "status-warning"
button-bg-color = "transparent"
label-max-length = 20

[modules.media]
button-bg-color = "transparent"
icon-color = "fg-muted"
icon-bg-color = "bg-surface-elevated"
label-color = "fg-muted"
label-max-length = 20

[modules.volume]
icon-color = "fg-subtle"
icon-bg-color = "bg-surface-elevated"
label-show = false
scroll-up = "wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+"
scroll-down = "wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-"

[modules.bluetooth]
icon-color = "fg-subtle"
icon-bg-color = "bg-surface-elevated"
label-show = false

[modules.network]
icon-color = "fg-subtle"
icon-bg-color = "bg-surface-elevated"
label-show = false
label-color = "bg-surface-elevated"

[modules.brightness]
icon-color = "fg-subtle"
icon-bg-color = "bg-surface-elevated"
label-show = false
scroll-up = "brightnessctl --device=intel_backlight set 1%+"
scroll-down = "brightnessctl --device=intel_backlight set 1%-"

[modules.notifications]
icon-color = "blue"
icon-bg-color = "bg-surface-elevated"
label-show = false
label-color = "border-subtle"

[modules.battery]
icon-color = "bg-base"
icon-bg-color = "red"
label-show = false

[[modules.battery.thresholds]]
above = 15
icon-color = "red"
icon-bg-color = "bg-surface-elevated"

[[modules.battery.thresholds]]
above = 30
icon-color = "yellow"
icon-bg-color = "bg-surface-elevated"

[[modules.battery.thresholds]]
above = 60
icon-color = "green"
icon-bg-color = "bg-surface-elevated"

[[modules.battery.thresholds]]
above = 90
icon-color = "green"
icon-bg-color = "bg-surface-elevated"

[[modules.battery.thresholds]]
above = 99
icon-color = "fg-subtle"
icon-bg-color = "bg-surface-elevated"

# Dashboard popup stat modules (icon-less, compact formats)
[modules.cpu]
format = "C/{{ percent }}%"
icon-show = false

[modules.ram]
format = "M/{{ percent }}%"
icon-show = false

[modules.storage]
format = "D/{{ percent }}%"
icon-show = false

[modules.netstat]
format = "N/d{{ down_auto }} / u{{ up_auto }}"
icon-show = false

[wallpaper]
cycling-enabled = true
cycling-directory = "/home/deuley/Pictures/wallpapers/Purple/"
cycling-interval-mins = 1

[[wallpaper.monitors]]
name = ""
fit-mode = "fill"
wallpaper = ""
